<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 40px; }
        .box { background: #16213e; padding: 30px; border-radius: 10px; max-width: 400px; margin: 0 auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #0f3460; color: #fff; border: 1px solid #533483; }
        button { width: 100%; padding: 12px; background: #e94560; color: #fff; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background: #ff6b6b; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Test Customer Login</h2>
        <p>Enter any email/password for testing</p>
        <input type="email" id="email" value="test@example.com" placeholder="Email">
        <input type="password" id="pass" value="password123" placeholder="Password">
        <button onclick="testLogin()">Login</button>
        <p id="result" style="margin-top:20px;"></p>
    </div>

    <script src="auth.js"></script>
    <script>
async function testLogin() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    
    // Create local customer session
    const customer = {
        id: 'cust-' + Date.now(),
        email: email,
        first_name: 'Test',
        last_name: 'Customer',
        phone: '+254700000000',
        role: 'customer'
    };
    
    localStorage.setItem('user', JSON.stringify(customer));
    localStorage.setItem('token', 'test-token');
    localStorage.setItem('loginTime', Date.now().toString());
    
    document.getElementById('result').innerHTML = '<span style="color:#0f0">Login successful!</span><br>Redirecting...';
    
    setTimeout(() => {
        window.location.href = 'customer-dashboard.html';
    }, 1000);
}
    </script>
</body>
</html>
