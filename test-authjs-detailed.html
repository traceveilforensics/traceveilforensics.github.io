<!DOCTYPE html>
<html>
<head>
    <title>auth.js Detailed Test</title>
</head>
<body>
    <h1>auth.js Detailed Test</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px; max-height: 500px; overflow: auto;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
            console.log(msg);
        }
        
        async function test() {
            log('1. authSystem ready: ' + !!window.authSystem);
            log('2. Waiting for data...');
            
            await window.authSystem.waitForReady();
            
            log('3. Data ready!');
            log('');
            log('=== RESULTS ===', '#FFD700');
            log('customers: ' + window.authSystem.getCustomers().length);
            log('reviews: ' + window.authSystem.getReviews().length);
            log('services: ' + window.authSystem.getServices().length);
            log('invoices: ' + window.authSystem.getInvoices().length);
            log('requests: ' + window.authSystem.getServiceRequests().length);
            log('pricing: ' + window.authSystem.getPricing().length);
            
            // Check cache directly
            log('');
            log('=== CACHE CHECK ===', '#FFD700');
            const cache = window.authSystem._cache || {};
            log('customers in cache: ' + (cache.customers?.length || 'undefined'));
            log('reviews in cache: ' + (cache.reviews?.length || 'undefined'));
        }
        
        setTimeout(test, 500);
    </script>
</body>
</html>
