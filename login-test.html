<!DOCTYPE html>
<html>
<head><title>Login Test</title></head>
<body>
<h1>Login Test</h1>
<form id="form">
    <input type="email" id="email" value="admin@traceveilforensics.com"><br><br>
    <input type="password" id="password" value="admin123"><br><br>
    <button type="submit">Login</button>
</form>
<pre id="output"></pre>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
const out = document.getElementById('output');
function log(msg) { out.textContent += msg + '\n'; console.log(msg); }

document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    log('Logging in...');
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const result = await window.authSystem.login(email, password);
    log('Result: ' + JSON.stringify(result, null, 2));
    if (result.success) {
        log('Login OK! Role: ' + result.user.role);
        log('Redirecting...');
        window.location.href = 'admin-dashboard.html';
    } else {
        log('Login failed: ' + result.error);
    }
});
</script>
</body>
</html>
