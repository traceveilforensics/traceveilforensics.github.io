<!DOCTYPE html>
<html>
<head>
    <title>Simple Admin Test</title>
</head>
<body>
    <h1>Loading...</h1>
    <div id="output"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const output = document.getElementById('output');
        
        async function init() {
            output.innerHTML = '<h2>Initializing...</h2>';
            
            // Wait for authSystem
            let attempts = 0;
            while (!window.authSystem && attempts < 100) {
                await new Promise(r => setTimeout(r, 50));
                attempts++;
            }
            
            if (!window.authSystem) {
                output.innerHTML = '<h2 style="color:red">authSystem not loaded!</h2>';
                return;
            }
            
            output.innerHTML += '<p>authSystem loaded</p>';
            
            // Wait for data
            await window.authSystem.waitForReady();
            output.innerHTML += '<p>Data ready</p>';
            
            // Check data
            const stats = window.authSystem.getDashboardStats();
            output.innerHTML += `
                <h2>Dashboard Data:</h2>
                <ul>
                    <li>Services: ${window.authSystem.getServices().length}</li>
                    <li>Customers: ${window.authSystem.getCustomers().length}</li>
                    <li>Invoices: ${window.authSystem.getInvoices().length}</li>
                    <li>Requests: ${window.authSystem.getServiceRequests().length}</li>
                    <li>Revenue: KES ${stats.totalRevenue}</li>
                </ul>
            `;
            
            // Check if functions exist
            output.innerHTML += `
                <h2>Functions:</h2>
                <ul>
                    <li>loadDashboard: ${typeof window.loadDashboard}</li>
                    <li>loadCustomers: ${typeof window.loadCustomers}</li>
                    <li>setupNavigation: ${typeof window.setupNavigation}</li>
                </ul>
            `;
        }
        
        window.addEventListener('load', init);
    </script>
</body>
</html>
