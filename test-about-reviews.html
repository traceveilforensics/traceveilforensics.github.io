<!DOCTYPE html>
<html>
<head>
    <title>About Reviews Test</title>
</head>
<body>
    <h1>About Reviews Test</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
        }
        
        function generateStars(rating) {
            let stars = '';
            for (let i = 1; i <= 5; i++) {
                stars += i <= rating ? '★' : '☆';
            }
            return stars;
        }
        
        async function test() {
            log('Testing about page reviews...', '#FFD700');
            log('authSystem ready: ' + !!window.authSystem);
            log('isReady: ' + (window.authSystem?.isReady ? window.authSystem.isReady() : 'function not found'));
            
            await window.authSystem.waitForReady();
            log('After wait - isReady: ' + window.authSystem.isReady());
            
            const reviews = window.authSystem.getReviews();
            log('\nTotal reviews: ' + reviews.length);
            
            const activeReviews = reviews
                .filter(r => r.flagged !== true)
                .sort((a, b) => b.rating - a.rating)
                .slice(0, 3);
            
            log('Top 3 unflagged: ' + activeReviews.length);
            
            activeReviews.forEach(r => {
                log('\n' + r.customer_name);
                log('Rating: ' + generateStars(r.rating));
                log('Comment: ' + (r.comment || r.content || 'N/A').substring(0, 50));
            });
        }
        
        setTimeout(test, 500);
    </script>
</body>
</html>
