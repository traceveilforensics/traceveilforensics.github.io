<!DOCTYPE html>
<html>
<head>
    <title>Test CRUD Functions Link</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: monospace; padding: 20px; }
        .result { padding: 10px; margin: 5px 0; border-radius: 5px; }
        .pass { background: #065f46; }
        .fail { background: #7f1d1d; }
        .info { background: #1e3a5f; }
    </style>
</head>
<body>
    <h1>Test CRUD Functions Linked to authSystem</h1>
    <div id="results"></div>
    
    <script>
const results = document.getElementById('results');

function log(msg, status = 'info') {
    const div = document.createElement('div');
    div.className = 'result ' + status;
    div.innerHTML = msg;
    results.appendChild(div);
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function run() {
    log('<h2>1. Check authSystem Functions Exist</h2>');
    
    const requiredFunctions = [
        'addCustomer', 'updateCustomer', 'deleteCustomer',
        'addService', 'updateService', 'deleteService',
        'addPricingPlan', 'updatePricingPlan', 'deletePricingPlan',
        'addInvoice', 'updateInvoice', 'deleteInvoice',
        'updateServiceRequest', 'updateReview', 'deleteReview',
        'getServices', 'getCustomers', 'getInvoices', 'getPricing', 'getServiceRequests', 'getReviews',
        'getDashboardStats', 'getCustomerById'
    ];
    
    let allExist = true;
    for (const fn of requiredFunctions) {
        const exists = typeof window.authSystem[fn] === 'function';
        log(`${fn}: ${exists ? '✓' : '✗ MISSING'}`, exists ? 'pass' : 'fail');
        if (!exists) allExist = false;
    }
    
    if (!allExist) {
        log('<h2>ERROR: Some functions are missing!</h2>');
        return;
    }
    
    log('<h2>2. Login</h2>');
    await window.authSystem.waitForReady();
    const loginResult = await window.authSystem.login('admin@traceveilforensics.com', 'admin123');
    if (loginResult.success) {
        log('Logged in as: ' + loginResult.user.email, 'pass');
    } else {
        log('Login failed: ' + loginResult.error, 'fail');
        return;
    }
    
    await sleep(500);
    
    // ====== TEST CUSTOMERS ======
    log('<h2>3. CUSTOMER CRUD</h2>');
    
    const customers = window.authSystem.getCustomers();
    log('Total customers: ' + customers.length);
    
    // CREATE
    const cResult = await window.authSystem.addCustomer({
        email: 'test_crud_' + Date.now() + '@test.com',
        first_name: 'Test',
        last_name: 'User',
        phone: '+254700000000'
    });
    log('CREATE Customer: ' + (cResult.success ? '✓' : '✗ ' + cResult.error), cResult.success ? 'pass' : 'fail');
    
    await sleep(500);
    
    // READ
    const customers2 = window.authSystem.getCustomers();
    const newC = customers2.find(c => c.email?.includes('test_crud_'));
    log('READ Customers: Found ' + customers2.length + ' customers', customers2.length > 0 ? 'pass' : 'fail');
    
    if (newC) {
        // VIEW
        const viewed = window.authSystem.getCustomerById(newC.id);
        log('VIEW Customer: ' + (viewed ? viewed.first_name + ' ' + viewed.last_name : '✗ NOT FOUND'), viewed ? 'pass' : 'fail');
        
        // UPDATE
        const uResult = await window.authSystem.updateCustomer(newC.id, {
            first_name: 'Updated',
            last_name: 'Name',
            email: newC.email
        });
        log('UPDATE Customer: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
        
        await sleep(500);
        
        // DELETE
        const dResult = await window.authSystem.deleteCustomer(newC.id);
        log('DELETE Customer: ' + (dResult.success ? '✓' : '✗ ' + dResult.error), dResult.success ? 'pass' : 'fail');
    }
    
    // ====== TEST SERVICES ======
    log('<h2>4. SERVICE CRUD</h2>');
    
    const services = window.authSystem.getServices();
    log('Total services: ' + services.length);
    
    // CREATE
    const sResult = await window.authSystem.addService({
        name: 'Test Service ' + Date.now(),
        slug: 'test-svc-' + Date.now(),
        icon: 'fa-shield-alt',
        description: 'Test',
        order: 99,
        active: true
    });
    log('CREATE Service: ' + (sResult.success ? '✓' : '✗ ' + JSON.stringify(sResult)), sResult.success ? 'pass' : 'fail');
    
    await sleep(500);
    
    // READ
    const services2 = window.authSystem.getServices();
    const newS = services2.find(s => s.name?.includes('Test Service'));
    log('READ Services: Found ' + services2.length + ' services', services2.length > 0 ? 'pass' : 'fail');
    
    if (newS) {
        // UPDATE
        const uResult = await window.authSystem.updateService(newS.id, {
            name: newS.name + ' UPDATED',
            description: 'Updated desc',
            icon: newS.icon,
            order: newS.order,
            active: newS.is_active
        });
        log('UPDATE Service: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
        
        await sleep(500);
        
        // DELETE
        const dResult = await window.authSystem.deleteService(newS.id);
        log('DELETE Service: ' + (dResult.success ? '✓' : '✗ ' + dResult.error), dResult.success ? 'pass' : 'fail');
    }
    
    // ====== TEST PRICING ======
    log('<h2>5. PRICING CRUD</h2>');
    
    const pricing = window.authSystem.getPricing();
    log('Total pricing: ' + pricing.length);
    
    // CREATE
    const pResult = await window.authSystem.addPricingPlan({
        service_id: services2[0]?.id,
        name: 'Test Plan ' + Date.now(),
        price: 999,
        billing_cycle: 'monthly',
        description: 'Test',
        features: ['Feature 1'],
        active: true
    });
    log('CREATE Pricing: ' + (pResult.success ? '✓' : '✗ ' + pResult.error), pResult.success ? 'pass' : 'fail');
    
    await sleep(500);
    
    // READ
    const pricing2 = window.authSystem.getPricing();
    const newP = pricing2.find(p => p.name?.includes('Test Plan'));
    log('READ Pricing: Found ' + pricing2.length + ' plans', pricing2.length > 0 ? 'pass' : 'fail');
    
    if (newP) {
        // UPDATE
        const uResult = await window.authSystem.updatePricingPlan(newP.id, {
            name: newP.name + ' UPDATED',
            price: 1999
        });
        log('UPDATE Pricing: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
        
        await sleep(500);
        
        // DELETE
        const dResult = await window.authSystem.deletePricingPlan(newP.id);
        log('DELETE Pricing: ' + (dResult.success ? '✓' : '✗ ' + dResult.error), dResult.success ? 'pass' : 'fail');
    }
    
    // ====== TEST INVOICES ======
    log('<h2>6. INVOICE CRUD</h2>');
    
    const invoices = window.authSystem.getInvoices();
    log('Total invoices: ' + invoices.length);
    
    // CREATE
    const iResult = await window.authSystem.addInvoice({
        customer_id: customers2[0]?.id,
        customer_email: customers2[0]?.email || 'test@test.com',
        customer_name: (customers2[0]?.first_name || 'Test') + ' ' + (customers2[0]?.last_name || 'User'),
        subtotal: 5000,
        tax_rate: 0,
        tax_amount: 0,
        total: 5000,
        due_date: '2026-04-20'
    });
    log('CREATE Invoice: ' + (iResult.success ? '✓' : '✗ ' + iResult.error), iResult.success ? 'pass' : 'fail');
    
    await sleep(500);
    
    // READ
    const invoices2 = window.authSystem.getInvoices();
    const newInv = invoices2[invoices2.length - 1];
    log('READ Invoices: Found ' + invoices2.length + ' invoices', invoices2.length > 0 ? 'pass' : 'fail');
    
    if (newInv) {
        // UPDATE
        const uResult = await window.authSystem.updateInvoice(newInv.id, { status: 'paid' });
        log('UPDATE Invoice: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
        
        await sleep(500);
        
        // DELETE
        const dResult = await window.authSystem.deleteInvoice(newInv.id);
        log('DELETE Invoice: ' + (dResult.success ? '✓' : '✗ ' + dResult.error), dResult.success ? 'pass' : 'fail');
    }
    
    // ====== TEST SERVICE REQUESTS ======
    log('<h2>7. SERVICE REQUEST (UPDATE)</h2>');
    
    const requests = window.authSystem.getServiceRequests();
    log('Total requests: ' + requests.length);
    
    if (requests.length > 0) {
        const uResult = await window.authSystem.updateServiceRequest(requests[0].id, {
            status: 'in_progress',
            notes: 'Test note'
        });
        log('UPDATE Service Request: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
    }
    
    // ====== TEST REVIEWS ======
    log('<h2>8. REVIEW CRUD</h2>');
    
    const reviews = window.authSystem.getReviews();
    log('Total reviews: ' + reviews.length);
    
    if (reviews.length > 0) {
        // UPDATE
        const uResult = await window.authSystem.updateReview(reviews[0].id, { is_approved: false });
        log('UPDATE Review: ' + (uResult.success ? '✓' : '✗ ' + uResult.error), uResult.success ? 'pass' : 'fail');
        
        await sleep(500);
        
        // DELETE
        const dResult = await window.authSystem.deleteReview(reviews[0].id);
        log('DELETE Review: ' + (dResult.success ? '✓' : '✗ ' + dResult.error), dResult.success ? 'pass' : 'fail');
    }
    
    // ====== DASHBOARD STATS ======
    log('<h2>9. DASHBOARD STATS</h2>');
    
    const stats = window.authSystem.getDashboardStats();
    log('Stats: ' + JSON.stringify(stats), 'info');
    
    log('<h2>TEST COMPLETE!</h2>');
}

setTimeout(run, 1500);
    </script>
</body>
</html>
