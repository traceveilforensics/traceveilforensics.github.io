<!DOCTYPE html>
<html>
<head>
    <title>Fetch Debug</title>
</head>
<body>
    <h1>Fetch Debug</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px;"></pre>
    
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
        }
        
        async function test() {
            log('Testing fetchTable function...', '#FFD700');
            
            // Wait for ready
            await window.authSystem.waitForReady();
            
            log('\nResults:');
            log('customers: ' + window.authSystem.getCustomers().length);
            log('reviews: ' + window.authSystem.getReviews().length);
            log('services: ' + window.authSystem.getServices().length);
            log('invoices: ' + window.authSystem.getInvoices().length);
            log('requests: ' + window.authSystem.getServiceRequests().length);
            log('pricing: ' + window.authSystem.getPricing().length);
            
            // Show sample data
            const customers = window.authSystem.getCustomers();
            if (customers.length > 0) {
                log('\nCustomer sample:', '#FFD700');
                log(JSON.stringify(customers[0], null, 2).substring(0, 500));
            }
            
            const reviews = window.authSystem.getReviews();
            if (reviews.length > 0) {
                log('\nReview sample:', '#FFD700');
                log(JSON.stringify(reviews[0], null, 2).substring(0, 500));
            }
        }
        
        setTimeout(test, 1000);
    </script>
</body>
</html>
