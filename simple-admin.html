<!DOCTYPE html>
<html>
<head><title>Simple Admin</title></head>
<body style="font-family:Arial;padding:20px;background:#0a1628;color:white;min-height:100vh;">
<h1>Trace Veil Admin</h1>
<div id="status">Loading...</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
const status = document.getElementById('status');

function update(msg) {
    status.innerHTML += '<p>' + msg + '</p>';
    console.log(msg);
}

function updateContent(html) {
    document.body.innerHTML = '<h1>Trace Veil Admin Dashboard</h1>' + html;
}

setTimeout(async () => {
    update('1. authSystem: ' + (!!window.authSystem));
    
    const user = window.authSystem.getStoredUser();
    update('2. User: ' + (user ? user.email + ' (role: ' + user.role + ')' : 'none'));
    
    if (user && user.role === 'admin') {
        update('3. Admin found! Loading dashboard...');
        
        const stats = window.authSystem.getDashboardStats();
        update('4. Stats loaded: ' + JSON.stringify(stats));
        
        updateContent(`
            <h2>Welcome, ${user.first_name || user.email}!</h2>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:20px;">
                <div style="background:#1e3a5f;padding:20px;border-radius:10px;text-align:center;">
                    <div style="font-size:32px;font-weight:bold;color:#FFD700;">${stats.totalCustomers}</div>
                    <div>Customers</div>
                </div>
                <div style="background:#1e3a5f;padding:20px;border-radius:10px;text-align:center;">
                    <div style="font-size:32px;font-weight:bold;color:#10b981;">KES ${stats.totalRevenue}</div>
                    <div>Revenue</div>
                </div>
                <div style="background:#1e3a5f;padding:20px;border-radius:10px;text-align:center;">
                    <div style="font-size:32px;font-weight:bold;color:#f59e0b;">${stats.pendingInvoices}</div>
                    <div>Pending Invoices</div>
                </div>
                <div style="background:#1e3a5f;padding:20px;border-radius:10px;text-align:center;">
                    <div style="font-size:32px;font-weight:bold;color:#3b82f6;">${stats.totalRequests}</div>
                    <div>Service Requests</div>
                </div>
            </div>
            <button onclick="window.authSystem.logout();location.reload();" style="margin-top:30px;padding:15px 30px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;">Logout</button>
        `);
    } else if (user) {
        update('3. Not admin, role is: ' + user.role);
        updateContent('<p>You are logged in as ' + user.email + ' but not as admin.</p><button onclick="window.authSystem.logout();location.reload();" style="padding:15px 30px;background:#ef4444;color:white;border:none;border-radius:8px;cursor:pointer;">Logout</button>');
    } else {
        update('3. No user. Redirecting to login...');
        updateContent('<p>No user found. <a href="admin-login.html" style="color:#FFD700;">Go to Login</a></p>');
    }
}, 1000);
</script>
</body>
</html>
