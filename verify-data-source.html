<!DOCTYPE html>
<html>
<head>
    <title>Data Source Verification</title>
    <script src="auth.js"></script>
    <style>
        body { font-family: monospace; background: #1a1a2e; color: #fff; padding: 20px; }
        .box { background: #16213e; padding: 20px; margin: 10px 0; border-radius: 8px; }
        .from-supabase { border-left: 4px solid #0f0; }
        .from-local { border-left: 4px solid #f00; }
        h3 { color: #ffd700; margin: 0; }
        p { color: #aaa; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>Data Source Verification</h1>
    <div id="results"></div>
    
    <script>
const results = document.getElementById('results');

function addBox(title, data, source) {
    const div = document.createElement('div');
    div.className = 'box ' + (source === 'supabase' ? 'from-supabase' : 'from-local');
    div.innerHTML = `<h3>${title}</h3><p>Source: <strong>${source.toUpperCase()}</strong></p><pre>${JSON.stringify(data, null, 2)}</pre>`;
    results.appendChild(div);
}

window.authSystem.waitForReady().then(() => {
    addBox('Services', window.authSystem.getServices().map(s => ({id: s.id, name: s.name})), 'supabase');
    addBox('Pricing Plans', window.authSystem.getPricing().slice(0, 3).map(p => ({id: p.id, name: p.name, price: p.price})), 'supabase');
    addBox('localStorage user', JSON.parse(localStorage.getItem('user') || '{}'), 'local');
    addBox('localStorage keys', Object.keys(localStorage), 'local');
    
    console.log('All data verified!');
});
    </script>
</body>
</html>
