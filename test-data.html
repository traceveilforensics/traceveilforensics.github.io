<!DOCTYPE html>
<html>
<head><title>Test</title></head>
<body>
<h1>Testing...</h1>
<pre id="out"></pre>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="auth.js"></script>
<script>
const out = document.getElementById('out');
setTimeout(() => {
    out.textContent = 'Services: ' + window.authSystem.getServices().length + '\n';
    out.textContent += 'Pricing: ' + window.authSystem.getPricing().length + '\n';
    out.textContent += 'Customers: ' + window.authSystem.getCustomers().length + '\n';
    out.textContent += 'Invoices: ' + window.authSystem.getInvoices().length + '\n';
    out.textContent += 'Reviews: ' + window.authSystem.getReviews().length + '\n';
    const stats = window.authSystem.getDashboardStats();
    out.textContent += 'Total Revenue: ' + stats.totalRevenue;
}, 2000);
</script>
</body>
</html>
