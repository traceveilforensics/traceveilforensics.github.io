<!DOCTYPE html>
<html>
<head>
    <title>Test All CRUD Operations</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: monospace; padding: 20px; }
        .test { padding: 10px; margin: 5px 0; border-radius: 5px; }
        .pass { background: #065f46; border-left: 4px solid #10b981; }
        .fail { background: #7f1d1d; border-left: 4px solid #ef4444; }
        .pending { background: #1e3a5f; border-left: 4px solid #3b82f6; }
        pre { background: #1e293b; padding: 10px; border-radius: 5px; overflow-x: auto; }
        h2 { color: #ffd700; margin-top: 30px; }
    </style>
</head>
<body>
    <h1>Testing All Admin CRUD Operations</h1>
    <div id="results"></div>
    <script>
const results = document.getElementById('results');

function log(msg, status = 'pending') {
    const div = document.createElement('div');
    div.className = 'test ' + status;
    div.innerHTML = msg;
    results.appendChild(div);
    console.log(msg);
}

async function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runTests() {
    log('<h2>1. Initial Setup</h2>');
    
    // Wait for auth system
    if (!window.authSystem) {
        log('authSystem not loaded!', 'fail');
        return;
    }
    log('authSystem loaded ✓', 'pass');
    
    await window.authSystem.waitForReady();
    log('Data loaded from Supabase ✓', 'pass');
    
    // Login as admin
    log('<h2>2. Login Test</h2>');
    const loginResult = await window.authSystem.login('admin@traceveilforensics.com', 'admin123');
    if (loginResult.success) {
        log('Login successful: ' + loginResult.user.email, 'pass');
    } else {
        log('Login failed: ' + loginResult.error, 'fail');
        return;
    }
    
    // ========== CUSTOMERS ==========
    log('<h2>3. Customers CRUD</h2>');
    
    // CREATE Customer
    const newCustomer = await window.authSystem.addCustomer({
        email: 'test_crud_' + Date.now() + '@test.com',
        first_name: 'Test',
        last_name: 'Customer',
        phone: '+254700000000'
    });
    log('CREATE Customer: ' + (newCustomer.success ? 'SUCCESS ✓' : 'FAILED ✗ - ' + JSON.stringify(newCustomer)), newCustomer.success ? 'pass' : 'fail');
    
    let customerId = null;
    if (newCustomer.success) {
        // Get the new customer ID
        const customers = window.authSystem.getCustomers();
        const created = customers.find(c => c.email.includes('test_crud_'));
        customerId = created ? created.id : null;
        log('Customer ID: ' + customerId, 'pass');
    }
    
    // READ Customers
    const allCustomers = window.authSystem.getCustomers();
    log('READ Customers: Found ' + allCustomers.length + ' customers ✓', allCustomers.length >= 0 ? 'pass' : 'fail');
    
    // UPDATE Customer
    if (customerId) {
        const updateResult = await window.authSystem.updateCustomer(customerId, {
            first_name: 'Updated',
            last_name: 'Name',
            email: allCustomers.find(c => c.id === customerId)?.email
        });
        log('UPDATE Customer: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Customer: SKIPPED (no customer ID)', 'pending');
    }
    
    // DELETE Customer
    if (customerId) {
        const deleteResult = await window.authSystem.deleteCustomer(customerId);
        log('DELETE Customer: ' + (deleteResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), deleteResult.success ? 'pass' : 'fail');
    } else {
        log('DELETE Customer: SKIPPED (no customer ID)', 'pending');
    }
    
    // ========== SERVICES ==========
    log('<h2>4. Services CRUD</h2>');
    
    // CREATE Service
    const newService = await window.authSystem.addService({
        name: 'Test Service ' + Date.now(),
        slug: 'test-service-' + Date.now(),
        icon: 'fa-shield-alt',
        description: 'Test service description',
        order: 99,
        active: true
    });
    log('CREATE Service: ' + (newService.success ? 'SUCCESS ✓' : 'FAILED ✗ - ' + JSON.stringify(newService)), newService.success ? 'pass' : 'fail');
    
    let serviceId = null;
    if (newService.success) {
        const services = window.authSystem.getServices();
        const created = services.find(s => s.name.includes('Test Service'));
        serviceId = created ? created.id : null;
    }
    
    // READ Services
    const allServices = window.authSystem.getServices();
    log('READ Services: Found ' + allServices.length + ' services ✓', allServices.length > 0 ? 'pass' : 'fail');
    
    // UPDATE Service
    if (serviceId) {
        const updateResult = await window.authSystem.updateService(serviceId, {
            name: 'Updated Test Service',
            description: 'Updated description'
        });
        log('UPDATE Service: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Service: SKIPPED (no service ID)', 'pending');
    }
    
    // DELETE Service
    if (serviceId) {
        const deleteResult = await window.authSystem.deleteService(serviceId);
        log('DELETE Service: ' + (deleteResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), deleteResult.success ? 'pass' : 'fail');
    } else {
        log('DELETE Service: SKIPPED (no service ID)', 'pending');
    }
    
    // ========== PRICING ==========
    log('<h2>5. Pricing Plans CRUD</h2>');
    
    // Get a service ID for pricing
    const services = window.authSystem.getServices();
    const targetService = services[0];
    
    // CREATE Pricing Plan
    const newPricing = await window.authSystem.addPricingPlan({
        service_id: targetService?.id,
        name: 'Test Plan ' + Date.now(),
        price: 999,
        billing_cycle: 'monthly',
        description: 'Test pricing plan',
        features: ['Feature 1', 'Feature 2'],
        active: true
    });
    log('CREATE Pricing: ' + (newPricing.success ? 'SUCCESS ✓' : 'FAILED ✗ - ' + JSON.stringify(newPricing)), newPricing.success ? 'pass' : 'fail');
    
    let pricingId = null;
    if (newPricing.success) {
        const pricing = window.authSystem.getPricing();
        const created = pricing.find(p => p.name.includes('Test Plan'));
        pricingId = created ? created.id : null;
    }
    
    // READ Pricing
    const allPricing = window.authSystem.getPricing();
    log('READ Pricing: Found ' + allPricing.length + ' plans ✓', allPricing.length >= 0 ? 'pass' : 'fail');
    
    // UPDATE Pricing
    if (pricingId) {
        const updateResult = await window.authSystem.updatePricingPlan(pricingId, {
            name: 'Updated Test Plan',
            price: 1999
        });
        log('UPDATE Pricing: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Pricing: SKIPPED (no pricing ID)', 'pending');
    }
    
    // DELETE Pricing
    if (pricingId) {
        const deleteResult = await window.authSystem.deletePricingPlan(pricingId);
        log('DELETE Pricing: ' + (deleteResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), deleteResult.success ? 'pass' : 'fail');
    } else {
        log('DELETE Pricing: SKIPPED (no pricing ID)', 'pending');
    }
    
    // ========== INVOICES ==========
    log('<h2>6. Invoices CRUD</h2>');
    
    // Get a customer for invoice
    const custs = window.authSystem.getCustomers();
    const targetCust = custs[0];
    
    // CREATE Invoice
    const newInvoice = await window.authSystem.addInvoice({
        customer_id: targetCust?.id || 1,
        customer_email: targetCust?.email || 'test@test.com',
        customer_name: targetCust?.first_name + ' ' + targetCust?.last_name || 'Test Customer',
        subtotal: 5000,
        tax_rate: 0,
        tax_amount: 0,
        total: 5000,
        due_date: '2026-04-20'
    });
    log('CREATE Invoice: ' + (newInvoice.success ? 'SUCCESS ✓' : 'FAILED ✗ - ' + JSON.stringify(newInvoice)), newInvoice.success ? 'pass' : 'fail');
    
    let invoiceId = null;
    if (newInvoice.success) {
        const invoices = window.authSystem.getInvoices();
        const created = invoices[invoices.length - 1];
        invoiceId = created ? created.id : null;
    }
    
    // READ Invoices
    const allInvoices = window.authSystem.getInvoices();
    log('READ Invoices: Found ' + allInvoices.length + ' invoices ✓', allInvoices.length >= 0 ? 'pass' : 'fail');
    
    // UPDATE Invoice
    if (invoiceId) {
        const updateResult = await window.authSystem.updateInvoice(invoiceId, { status: 'paid' });
        log('UPDATE Invoice: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Invoice: SKIPPED (no invoice ID)', 'pending');
    }
    
    // DELETE Invoice
    if (invoiceId) {
        const deleteResult = await window.authSystem.deleteInvoice(invoiceId);
        log('DELETE Invoice: ' + (deleteResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), deleteResult.success ? 'pass' : 'fail');
    } else {
        log('DELETE Invoice: SKIPPED (no invoice ID)', 'pending');
    }
    
    // ========== SERVICE REQUESTS ==========
    log('<h2>7. Service Requests CRUD</h2>');
    
    // READ Service Requests
    const allRequests = window.authSystem.getServiceRequests();
    log('READ Service Requests: Found ' + allRequests.length + ' requests ✓', allRequests.length >= 0 ? 'pass' : 'fail');
    
    // UPDATE Service Request (if we have one)
    if (allRequests.length > 0) {
        const reqId = allRequests[0].id;
        const updateResult = await window.authSystem.updateServiceRequest(reqId, {
            status: 'in_progress',
            notes: 'Test note'
        });
        log('UPDATE Service Request: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Service Request: SKIPPED (no requests)', 'pending');
    }
    
    // ========== REVIEWS ==========
    log('<h2>8. Reviews CRUD</h2>');
    
    // READ Reviews
    const allReviews = window.authSystem.getReviews();
    log('READ Reviews: Found ' + allReviews.length + ' reviews ✓', allReviews.length >= 0 ? 'pass' : 'fail');
    
    // UPDATE Review (if we have one)
    if (allReviews.length > 0) {
        const reviewId = allReviews[0].id;
        const updateResult = await window.authSystem.updateReview(reviewId, {
            is_approved: false
        });
        log('UPDATE Review: ' + (updateResult.success ? 'SUCCESS ✓' : 'FAILED ✗'), updateResult.success ? 'pass' : 'fail');
    } else {
        log('UPDATE Review: SKIPPED (no reviews)', 'pending');
    }
    
    // ========== DASHBOARD STATS ==========
    log('<h2>9. Dashboard Stats</h2>');
    
    const stats = window.authSystem.getDashboardStats();
    log('Stats: ' + JSON.stringify(stats, null, 2), 'pass');
    
    // ========== SUMMARY ==========
    log('<h2>Test Complete!</h2>');
    log('Check console (F12) for detailed logs.');
}

setTimeout(runTests, 1000);
    </script>
</body>
</html>
