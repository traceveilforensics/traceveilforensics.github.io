<!DOCTYPE html>
<html>
<head>
    <title>Test auth.js</title>
</head>
<body>
    <h1>Test auth.js Login</h1>
    <button onclick="testLogin()">Test Login</button>
    <pre id="out" style="background:#eee;padding:20px;max-height:300px;overflow:auto;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg) {
            out.textContent += msg + '\n';
            console.log(msg);
        }
        
        log('authSystem ready: ' + !!window.authSystem);
        
        async function testLogin() {
            log('Testing login...');
            const result = await window.authSystem.login('admin@traceveilforensics.com', 'admin123');
            log('Result: ' + JSON.stringify(result, null, 2));
        }
    </script>
</body>
</html>
