<!DOCTYPE html>
<html>
<head>
    <title>Debug Admin</title>
</head>
<body>
    <h1>Debug Admin Dashboard</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px; max-height: 400px; overflow: auto;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
            console.log(msg);
        }
        
        async function test() {
            log('=== Debug Test ===', '#FFD700');
            log('auth.js loaded: ' + (typeof window.authSystem !== 'undefined'));
            log('authSystem functions:', '#FFD700');
            log('  - waitForReady: ' + (typeof window.authSystem?.waitForReady));
            log('  - getServices: ' + (typeof window.authSystem?.getServices));
            log('  - loadDashboard: ' + (typeof window.authSystem?.loadDashboard));
            
            if (!window.authSystem) {
                log('authSystem NOT defined!', '#ff4444');
                return;
            }
            
            log('\nWaiting for data...');
            await window.authSystem.waitForReady();
            log('Data ready!');
            
            log('\nData check:');
            log('  Services: ' + window.authSystem.getServices().length);
            log('  Customers: ' + window.authSystem.getCustomers().length);
            log('  isReady: ' + window.authSystem.isReady());
            
            // Try to call loadDashboard if it exists on authSystem
            if (typeof window.authSystem.loadDashboard === 'function') {
                log('\nCalling loadDashboard()...');
                window.authSystem.loadDashboard();
            } else {
                log('\nloadDashboard not found on authSystem', '#ff8800');
            }
        }
        
        setTimeout(test, 500);
    </script>
</body>
</html>
