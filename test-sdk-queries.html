<!DOCTYPE html>
<html>
<head>
    <title>Test SDK Queries</title>
</head>
<body>
    <h1>Test SDK vs Direct API</h1>
    <button onclick="runTest()">Run Test</button>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
            console.log(msg);
        }
        
        const SB_URL = 'https://eapkpppftrxrwtwjbcen.supabase.co';
        const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcGtwcHBmdHJ4cnd0d2piY2VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxOTg3NDgsImV4cCI6MjA4NTc3NDc0OH0.5sYSUDqWAp2iId_LMGAZp0Pap-ZChispV8KedbVSBEY';
        const SB_SVC = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcGtwcHBmdHJ4cnd0d2piY2VuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDE5ODc0OCwiZXhwIjoyMDg1Nzc0NzQ4fQ.fVgPaQWfFbKu7ZacfLjK8mtKNlaLmSchS-XoY75Ejew';
        
        async function runTest() {
            log('=== Testing SDK Queries ===', '#FFD700');
            
            // Test with ANON key first
            log('\n1. Testing with ANON key...', '#FFD700');
            const anonClient = window.supabase.createClient(SB_URL, SB_ANON);
            
            let { data: anonData, error: anonError } = await anonClient.from('customers').select('*');
            log('ANON customers: ' + (anonData?.length || 0));
            log('ANON error: ' + (anonError?.message || 'none'));
            
            // Test with SERVICE key
            log('\n2. Testing with SERVICE key...', '#FFD700');
            const svcClient = window.supabase.createClient(SB_URL, SB_SVC);
            
            let { data: svcData, error: svcError } = await svcClient.from('customers').select('*');
            log('SVC customers: ' + (svcData?.length || 0));
            log('SVC error: ' + (svcError?.message || 'none'));
            
            // Check if service key is actually service role
            log('\n3. Checking service client auth...', '#FFD700');
            const session = await svcClient.auth.getSession();
            log('Session present: ' + !!session.data.session);
            log('User role from session: ' + (session.data.session?.user?.role || 'none'));
            
            // Try querying directly with fetch
            log('\n4. Direct fetch test...', '#FFD700');
            try {
                const response = await fetch(SB_URL + '/rest/v1/customers?select=*', {
                    headers: {
                        'apikey': SB_SVC,
                        'Authorization': 'Bearer ' + SB_SVC
                    }
                });
                const data = await response.json();
                log('Direct fetch customers: ' + data.length);
            } catch(e) {
                log('Direct fetch error: ' + e.message);
            }
        }
    </script>
</body>
</html>
