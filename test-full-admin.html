<!DOCTYPE html>
<html>
<head>
    <title>Test Full Admin</title>
</head>
<body>
    <h1>Testing Full Admin Dashboard</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px; max-height: 400px; overflow: auto;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
        }
        
        async function test() {
            log('Waiting for authSystem...');
            let attempts = 0;
            while (!window.authSystem && attempts < 100) {
                await new Promise(r => setTimeout(r, 50));
                attempts++;
            }
            
            if (!window.authSystem) {
                log('authSystem not loaded!', '#ff4444');
                return;
            }
            
            log('authSystem loaded');
            await window.authSystem.waitForReady();
            log('Data ready');
            
            // Now load admin dashboard script
            log('\nLoading admin dashboard script...');
            
            // Check if we can define a function
            function testFn() { return 'test'; }
            log('testFn: ' + (typeof testFn) + ' = ' + testFn());
            
            // Try to dynamically load the admin script
            const script = document.createElement('script');
            script.src = 'admin-dashboard.html';
            script.onload = () => {
                log('Admin script loaded');
                log('loadDashboard: ' + (typeof window.loadDashboard));
                log('loadCustomers: ' + (typeof window.loadCustomers));
                log('loadInvoices: ' + (typeof window.loadInvoices));
                
                // Try calling loadDashboard
                if (typeof window.loadDashboard === 'function') {
                    log('\nCalling loadDashboard...', '#88ff88');
                    // Create content area
                    const div = document.createElement('div');
                    div.id = 'contentArea';
                    document.body.appendChild(div);
                    try {
                        window.loadDashboard();
                        log('loadDashboard executed!', '#88ff88');
                        log('contentArea innerHTML length: ' + (document.getElementById('contentArea')?.innerHTML?.length || 0));
                    } catch (e) {
                        log('Error: ' + e.message, '#ff4444');
                    }
                }
            };
            script.onerror = (e) => {
                log('Failed to load admin script: ' + e, '#ff4444');
            };
            document.head.appendChild(script);
        }
        
        setTimeout(test, 100);
    </script>
</body>
</html>
