<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
</head>
<body>
    <h1>Connection Test</h1>
    <pre id="output" style="background: #eee; padding: 20px; overflow: auto;"></pre>
    
    <script>
        const out = document.getElementById('output');
        function log(msg) {
            out.textContent += msg + '\n';
            console.log(msg);
        }
        
        log('Testing Supabase connection...');
        
        // Step 1: Check if supabase is defined
        log('1. window.supabase: ' + typeof window.supabase);
        
        // Step 2: Try to load the SDK manually
        if (typeof window.supabase === 'undefined') {
            log('2. Loading Supabase SDK from CDN...');
            const script = document.createElement('script');
            script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js';
            script.onload = () => {
                log('   CDN script loaded!');
                runTest();
            };
            script.onerror = () => log('   CDN load failed!');
            document.head.appendChild(script);
        } else {
            runTest();
        }
        
        function runTest() {
            log('3. supabase after load: ' + typeof window.supabase);
            
            try {
                const sb = window.supabase.createClient(
                    'https://eapkpppftrxrwtwjbcen.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcGtwcHBmdHJ4cnd0d2piY2VuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAxOTg3NDgsImV4cCI6MjA4NTc3NDc0OH0.5sYSUDqWAp2iId_LMGAZp0Pap-ZChispV8KedbVSBEY'
                );
                log('4. Client created: ' + (sb ? 'yes' : 'no'));
                
                log('5. Calling signInWithPassword...');
                sb.auth.signInWithPassword({
                    email: 'admin@traceveilforensics.com',
                    password: 'admin123'
                }).then(result => {
                    log('6. Result error: ' + (result.error?.message || 'none'));
                    log('7. Result user: ' + (result.data?.user?.email || 'none'));
                    if (result.data?.user) {
                        log('✅ SUCCESS!');
                    } else if (result.error) {
                        log('❌ FAILED: ' + result.error.message);
                    }
                }).catch(e => {
                    log('❌ Exception: ' + e.message);
                });
            } catch(e) {
                log('❌ Setup error: ' + e.message);
            }
        }
    </script>
</body>
</html>
