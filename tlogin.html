<!DOCTYPE html>
<html>
<head>
    <title>Test Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
</head>
<body style="background:#000;color:#0f0;padding:20px;font-family:monospace;">
<h1>Test Login</h1>
<pre id="output"></pre>
<script>
const out = document.getElementById('output');
function log(msg) {
    out.textContent += msg + '\n';
    console.log(msg);
}

async function test() {
    log('Starting test...');
    log('Supabase loaded: ' + (typeof window.supabase !== 'undefined'));
    log('authSystem loaded: ' + !!window.authSystem);
    
    if (window.authSystem) {
        log('Attempting login...');
        const result = await window.authSystem.login('admin@traceveilforensics.com', 'admin123');
        log('Login result: ' + JSON.stringify(result, null, 2));
        
        if (result.success) {
            log('Login SUCCESS!');
            const user = window.authSystem.getStoredUser();
            log('Stored user: ' + JSON.stringify(user));
        } else {
            log('Login FAILED: ' + result.error);
        }
    } else {
        log('authSystem not loaded');
    }
}

setTimeout(test, 1000);
</script>
</body>
</html>
