<!DOCTYPE html>
<html>
<head>
    <title>Test Dashboard</title>
</head>
<body>
    <h1>Dashboard Test</h1>
    <p>User: <span id="user">checking...</span></p>
    <p>Data loaded: <span id="data">checking...</span></p>
    <pre id="out" style="background:#eee;padding:20px;max-height:400px;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        const userSpan = document.getElementById('user');
        const dataSpan = document.getElementById('data');
        
        function log(msg) {
            out.textContent += msg + '\n';
            console.log(msg);
        }
        
        function checkDashboard() {
            // Simulate what admin-dashboard does
            const user = window.authSystem.getStoredUser();
            userSpan.textContent = user ? user.email + ' (' + user.role + ')' : 'NOT LOGGED IN';
            
            log('Checking data...');
            
            // Wait for data
            window.authSystem.onReady(() => {
                log('Data is ready!');
                const stats = window.authSystem.getDashboardStats();
                log('Stats: ' + JSON.stringify(stats, null, 2));
                
                const services = window.authSystem.getServices();
                const pricing = window.authSystem.getPricing();
                const customers = window.authSystem.getCustomers();
                
                log('Services: ' + services.length);
                log('Pricing: ' + pricing.length);
                log('Customers: ' + customers.length);
                
                dataSpan.textContent = `Services: ${services.length}, Pricing: ${pricing.length}, Customers: ${customers.length}`;
                
                if (services.length > 0) {
                    log('Dashboard should show data correctly!');
                } else {
                    log('WARNING: No data loaded!');
                }
            });
        }
        
        // Check immediately
        setTimeout(checkDashboard, 500);
    </script>
</body>
</html>
