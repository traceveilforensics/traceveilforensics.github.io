<!DOCTYPE html>
<html>
<head>
    <title>CORS Test</title>
</head>
<body>
    <h1>CORS Test</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px;"></pre>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
        }
        
        const SB_SVC = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVhcGtwcHBmdHJ4cnd0d2piY2VuIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3MDE5ODc0OCwiZXhwIjoyMDg1Nzc0NzQ4fQ.fVgPaQWfFbKu7ZacfLjK8mtKNlaLmSchS-XoY75Ejew';
        const SB_URL = 'https://eapkpppftrxrwtwjbcen.supabase.co';
        
        async function test() {
            log('Testing direct fetch from browser...', '#FFD700');
            
            const tables = ['customers', 'reviews', 'services'];
            
            for (const table of tables) {
                log('\n' + table + ':', '#FFD700');
                try {
                    const response = await fetch(`${SB_URL}/rest/v1/${table}?select=*`, {
                        method: 'GET',
                        headers: {
                            'apikey': SB_SVC,
                            'Authorization': 'Bearer ' + SB_SVC
                        }
                    });
                    
                    log('Status: ' + response.status);
                    
                    if (response.ok) {
                        const data = await response.json();
                        log('Records: ' + (Array.isArray(data) ? data.length : 'error'));
                        if (Array.isArray(data) && data.length > 0) {
                            log('Sample: ' + JSON.stringify(data[0]).substring(0, 100));
                        }
                    } else {
                        const text = await response.text();
                        log('Error: ' + text.substring(0, 200));
                    }
                } catch (e) {
                    log('Exception: ' + e.message, '#ff4444');
                }
            }
        }
        
        test();
    </script>
</body>
</html>
