<!DOCTYPE html>
<html>
<head>
    <title>Admin Data Test</title>
</head>
<body>
    <h1>Admin Dashboard Data Test</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px; max-height: 500px; overflow: auto;"></pre>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
        }
        
        async function test() {
            log('Testing admin dashboard data...', '#FFD700');
            
            await window.authSystem.waitForReady();
            
            log('\n=== DATA ===', '#FFD700');
            log('Services: ' + window.authSystem.getServices().length);
            log('Customers: ' + window.authSystem.getCustomers().length);
            log('Invoices: ' + window.authSystem.getInvoices().length);
            log('Requests: ' + window.authSystem.getServiceRequests().length);
            log('Reviews: ' + window.authSystem.getReviews().length);
            log('Pricing: ' + window.authSystem.getPricing().length);
            
            log('\n=== SAMPLE DATA ===', '#FFD700');
            
            log('\n--- Customers ---');
            const customers = window.authSystem.getCustomers();
            customers.forEach(c => {
                log(c.first_name + ' ' + c.last_name + ' | ' + c.email);
            });
            
            log('\n--- Invoices ---');
            const invoices = window.authSystem.getInvoices();
            invoices.forEach(i => {
                log(i.invoice_number + ' | ' + i.customer_name + ' | ' + i.status);
            });
            
            log('\n--- Requests ---');
            const requests = window.authSystem.getServiceRequests();
            requests.forEach(r => {
                log(r.title + ' | ' + r.customer_name + ' | ' + r.status);
            });
            
            log('\n=== STATS ===', '#FFD700');
            const stats = window.authSystem.getDashboardStats();
            log(JSON.stringify(stats, null, 2));
        }
        
        test();
    </script>
</body>
</html>
