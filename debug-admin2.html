<!DOCTYPE html>
<html>
<head>
    <title>Debug Admin 2</title>
</head>
<body>
    <h1>Admin Dashboard Debug</h1>
    <pre id="out" style="background:#1a1a2e; color: #0f0; padding: 20px; max-height: 400px; overflow: auto;"></pre>
    
    <!-- Load the admin dashboard scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
    
    <script>
        const out = document.getElementById('out');
        function log(msg, color = '#0f0') {
            const line = document.createElement('div');
            line.style.color = color;
            line.textContent = msg;
            out.appendChild(line);
            console.log(msg);
        }
        
        async function test() {
            log('=== Checking loadDashboard ===', '#FFD700');
            
            // Check if loadDashboard is defined in window
            log('window.loadDashboard: ' + (typeof window.loadDashboard));
            log('window.setupNavigation: ' + (typeof window.setupNavigation));
            log('window.loadCustomers: ' + (typeof window.loadCustomers));
            log('window.loadInvoices: ' + (typeof window.loadInvoices));
            
            // Wait for data
            await window.authSystem.waitForReady();
            
            // Try calling loadDashboard
            if (typeof window.loadDashboard === 'function') {
                log('\nCalling loadDashboard...', '#88ff88');
                try {
                    window.loadDashboard();
                    log('loadDashboard executed!', '#88ff88');
                } catch (e) {
                    log('Error: ' + e.message, '#ff4444');
                }
            } else {
                log('\nloadDashboard not found - check for JS errors above', '#ff4444');
            }
        }
        
        // Simulate DOMContentLoaded
        window.addEventListener('load', () => {
            setTimeout(test, 100);
        });
    </script>
</body>
</html>
